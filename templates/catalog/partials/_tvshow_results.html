<div id="tvshow-results">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 light-background">
      {% for show in tvshows %}
        <div class="col">
          <div class="card h-100 border-success shadow-sm series-card position-relative">

            <!-- Poster container with consistent background -->
            <div class="card-img-top d-flex align-items-center justify-content-center" style="background-color:#f8f9fa;">
              <a href="{{ show.poster_url }}" target="_blank" rel="noopener noreferrer" title="Open full image">
                <!-- Lazy loading improves performance -->
                <img
                  src="{{ show.poster_url }}"
                  alt="{{ show.name }}"
                  style="height:280px; object-fit:contain; display:block; width:100%;"
                  loading="lazy"
                >
              </a>
            </div>

            <!-- Card body -->
            <div class="card-body d-flex flex-column">
              <h5 class="card-title text-success mb-1">{{ show.name }}</h5>
              <p class="card-text text-muted mb-2">
                {% if show.first_air_date %}First aired: {{ show.first_air_date.year }}{% endif %}
              </p>

              <!-- Fixed button at bottom-right -->
              <a href="{% url 'tvshow_details' show.id %}" class="btn btn-sm btn-success position-absolute bottom-0 end-0 m-2" aria-label="View details for {{ show.name }}">Details</a>
            </div>

          </div>
        </div>
      {% empty %}
        <div class="col-12">
          <p class="text-center text-muted">No TV shows found.</p>
        </div>
      {% endfor %}
    </div>
</div>
